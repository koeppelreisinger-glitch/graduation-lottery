<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>毕业季抽奖</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="introAnimation" class="intro-animation">
    <div class="vector-bg"></div>
    <svg class="wreath" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e7c5c6" />
          <stop offset="50%" stop-color="#f5e4d2" />
          <stop offset="100%" stop-color="#c6d4d5" />
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="80" fill="none" stroke="url(#ring)" stroke-width="18" />
      <circle cx="100" cy="100" r="62" fill="none" stroke="#fff" stroke-width="18" opacity="0.35" />
    </svg>

    <svg class="tree tree1" viewBox="0 0 120 220" xmlns="http://www.w3.org/2000/svg">
      <rect x="52" y="150" width="16" height="70" fill="#8e6643" rx="4" />
      <ellipse cx="60" cy="130" rx="45" ry="55" fill="#d9a6bb" />
      <ellipse cx="70" cy="110" rx="40" ry="45" fill="#f7b8c7" />
      <ellipse cx="50" cy="90" rx="35" ry="38" fill="#f7d0da" />
      <circle cx="42" cy="82" r="6" fill="#fff" opacity="0.8" />
      <circle cx="70" cy="120" r="4" fill="#ffffff" opacity="0.8" />
    </svg>

    <svg class="tree tree2" viewBox="0 0 120 220" xmlns="http://www.w3.org/2000/svg">
      <rect x="52" y="150" width="16" height="70" fill="#8e6643" rx="4" />
      <ellipse cx="60" cy="130" rx="45" ry="55" fill="#dcc8d4" />
      <ellipse cx="70" cy="110" rx="40" ry="45" fill="#eec4db" />
      <ellipse cx="50" cy="90" rx="35" ry="38" fill="#f9e6ea" />
      <circle cx="40" cy="90" r="4" fill="#fff" opacity="0.8" />
      <circle cx="70" cy="105" r="5" fill="#ffffff" opacity="0.8" />
    </svg>
    <div class="intro-text text-1" id="text1">2026对于你是极为特殊的一年</div>
    <div class="intro-text text-2" id="text2">无论未来你的选择如何</div>
    <div class="intro-text text-3" id="text3">你要永远无条件相信自己一定可以！</div>
    <div class="intro-text text-4" id="text4">正值五四青年节，送你一份幸运小礼物！</div>
  </div>

  <div class="app-container" id="mainContent" style="display: none;">
    <header class="title-card">
      <h1>毕业季抽奖</h1>
      <p>青春不散场，好礼送给你</p>
    </header>

    <section id="adminSection" class="card hidden">
      <h2>奖品配置（管理员模式）</h2>
      <form id="prizeForm" class="form-grid">
        <div class="field">
          <label>奖品名称</label>
          <input type="text" id="prizeName" placeholder="输入奖品名称" required />
        </div>
        <div class="field">
          <label>数量</label>
          <input type="number" id="prizeQty" min="1" value="1" required />
        </div>
        <div class="field">
          <label>图片（可选）</label>
          <input type="file" id="prizeImage" accept="image/*" />
        </div>
        <div class="field full">
          <button type="submit" class="btn primary">添加奖品</button>
        </div>
      </form>

      <div class="control-row">
        <button id="generateShareLink" class="btn accent">生成分享链接</button>
        <input type="text" id="shareLink" readonly placeholder="分享链接会在这里生成" />
      </div>

      <h3>当前奖品列表</h3>
      <div id="prizeList" class="list-grid"></div>
    </section>

    <section id="lotterySection" class="card hidden">
      <h2>抽奖模式</h2>
      <p>点击开始抽奖，试试你的运气!</p>
      <div class="wheel-container">
        <div id="wheel" class="wheel">
          <div class="wheel-center"></div>
        </div>
      </div>
      <button id="startDraw" class="btn primary large">开始抽奖</button>
      <p id="inventoryTip" class="tip"></p>
      <div id="resultCard" class="result-card hidden">
        <h3>恭喜中奖！</h3>
        <img id="resultImage" src="" alt="中奖图片" />
        <p id="resultName"></p>
      </div>
    </section>
  </div>

  <div id="overlay" class="overlay hidden"></div>

  <audio id="cheerAudio" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEA..."></audio>

  <script src="script.js"></script>
</body>
</html>
